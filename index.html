<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Betano</title>

<style>
body { font-family: Arial; background:#0f172a; color:#fff; padding:20px; }
input, textarea { width:100%; padding:8px; margin:5px 0; }
button { padding:10px; margin:5px 5px 5px 0; cursor:pointer; }

.good { color:#22c55e; }
.warn { color:#f59e0b; }
.bad { color:#ef4444; }

.scenario-row.good { background: rgba(34,197,94,0.1); }
.scenario-row.warn { background: rgba(245,158,11,0.1); }
.scenario-row.bad { background: rgba(239,68,68,0.1); }

table { width:100%; margin-top:10px; border-collapse:collapse; }
td, th { padding:8px; border-bottom:1px solid #333; }
</style>
</head>

<body>

<h2>Simulador Apuestas Sistema</h2>

<label>Banca</label>
<input id="bankroll">

<label>Stake</label>
<input id="stake">

<label>Pega picks</label>
<textarea id="batch">
Pick 1 | 1.28 | 64
Pick 2 | 1.32 | 61
Pick 3 | 1.35 | 59
</textarea>

<button id="load">Cargar</button>
<button id="clear">Limpiar</button>

<div id="resultado"></div>
<div id="escenarios"></div>

<script>
document.addEventListener("DOMContentLoaded", () => {

let picks = [];

function parse() {
  const lines = document.getElementById("batch").value.split("\n");
  picks = lines.map(l => {
    const p = l.split("|").map(x=>x.trim());
    return {
      label: p[0],
      odd: parseFloat(p[1]),
      prob: parseFloat(p[2]) / 100
    };
  }).filter(p => p.odd && p.prob);
}

function combinations(arr, k) {
  const res = [];
  function helper(start, comb) {
    if (comb.length === k) return res.push([...comb]);
    for (let i = start; i < arr.length; i++) {
      comb.push(arr[i]);
      helper(i+1, comb);
      comb.pop();
    }
  }
  helper(0, []);
  return res;
}

function product(arr) {
  return arr.reduce((a,b)=>a*b,1);
}

function calc() {
  if (!picks.length) return;

  const odds = picks.map(p=>p.odd);
  const probs = picks.map(p=>p.prob);
  const stake = parseFloat(document.getElementById("stake").value) || 0;

  const combos = combinations([0,1,2],2).concat(combinations([0,1,2],3));

  let bestEV = -Infinity;
  let best = null;

  const outcomes = 1 << picks.length;

  for (let s of [combos]) {

    let EV = 0;

    for (let i=0;i<outcomes;i++) {

      let prob = 1;
      let profit = 0;

      let result = [];

      for (let j=0;j<picks.length;j++) {
        const win = i & (1<<j);
        result.push(win);
        prob *= win ? probs[j] : (1-probs[j]);
      }

      for (let c of s) {
        const win = c.every(i=>result[i]);
        if (win) profit += stake/s.length * (product(c.map(i=>odds[i]))-1);
        else profit -= stake/s.length;
      }

      EV += prob * profit;
    }

    if (EV > bestEV) {
      bestEV = EV;
      best = s;
    }
  }

  document.getElementById("resultado").innerHTML =
    `<h3>EV esperado: ${bestEV.toFixed(0)}</h3>`;

  buildScale(best, odds, probs, stake);
}

function buildScale(groups, odds, probs, stake) {

  const outcomes = 1 << odds.length;
  const map = {};

  for (let i=0;i<outcomes;i++) {

    let misses = 0;
    let prob = 1;
    let profit = 0;

    let result = [];

    for (let j=0;j<odds.length;j++) {
      const win = i & (1<<j);
      result.push(win);
      if (!win) misses++;
      prob *= win ? probs[j] : (1-probs[j]);
    }

    for (let g of groups) {
      const win = g.every(i=>result[i]);
      if (win) profit += stake/groups.length * (product(g.map(i=>odds[i]))-1);
      else profit -= stake/groups.length;
    }

    if (!map[misses]) map[misses] = {prob:0, profit:0};
    map[misses].prob += prob;
    map[misses].profit += prob * profit;
  }

  let html = "<table><tr><th>Escenario</th><th>Prob</th><th>Profit</th></tr>";

  Object.keys(map).sort((a,b)=>a-b).forEach(m => {

    const avg = map[m].profit / map[m].prob;

    let cls = "warn";
    if (avg > 0) cls = "good";
    if (avg < 0) cls = "bad";

    html += `<tr class="scenario-row ${cls}">
      <td>${m} fallas</td>
      <td>${(map[m].prob*100).toFixed(1)}%</td>
      <td>${avg.toFixed(0)}</td>
    </tr>`;
  });

  html += "</table>";

  document.getElementById("escenarios").innerHTML = html;
}

document.getElementById("load").onclick = () => {
  parse();
  calc();
};

document.getElementById("clear").onclick = () => {
  document.getElementById("batch").value = "";
  document.getElementById("resultado").innerHTML = "";
  document.getElementById("escenarios").innerHTML = "";
};

});
</script>

</body>
</html>
