<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Sistema — Fútbol</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f12;
    --surface: #151820;
    --surface2: #1c2029;
    --border: #262c38;
    --border2: #313949;
    --text: #e8eaf0;
    --muted: #7a8499;
    --dim: #454e63;
    --green: #00c97a;
    --green-bg: rgba(0,201,122,.08);
    --red: #ff4f4f;
    --red-bg: rgba(255,79,79,.08);
    --amber: #f5a623;
    --amber-bg: rgba(245,166,35,.08);
    --blue: #4d9fff;
    --accent: #00c97a;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    position: sticky;
    top: 0;
    background: rgba(13,15,18,.92);
    backdrop-filter: blur(8px);
    z-index: 100;
  }
  .logo {
    width: 32px; height: 32px;
    background: var(--green);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  header h1 {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -.01em;
  }
  header p {
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
    font-family: var(--mono);
  }

  /* ── Layout ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 1.5rem;
    align-items: start;
  }
  @media(max-width:800px){
    main { grid-template-columns: 1fr; }
    header p { display: none; }
  }

  /* ── Panel left ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .panel-header {
    padding: .875rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: var(--mono);
  }
  .panel-body { padding: 1.25rem; }

  /* ── Selecciones ── */
  .sel-row {
    display: grid;
    grid-template-columns: 18px 1fr 90px 28px;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .sel-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    text-align: center;
  }
  input[type="text"], input[type="number"], select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 0 10px;
    height: 34px;
    outline: none;
    transition: border-color .15s;
    -moz-appearance: textfield;
  }
  input[type="number"] { font-family: var(--mono); }
  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--dim); }
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  select { cursor: pointer; }
  select option { background: var(--surface2); }

  .btn-icon {
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
    flex-shrink: 0;
  }
  .btn-icon:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }

  .btn-add {
    width: 100%;
    height: 34px;
    border: 1px dashed var(--border2);
    border-radius: 6px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    font-family: var(--sans);
    transition: all .15s;
    margin-top: 4px;
  }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Configuración ── */
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .form-group label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 5px;
    font-family: var(--mono);
  }
  .stake-wrap { position: relative; margin-bottom: 12px; }
  .stake-wrap span {
    position: absolute;
    left: 10px; top: 50%; transform: translateY(-50%);
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    pointer-events: none;
  }
  .stake-wrap input { padding-left: 38px; }

  /* ── Sistemas rápidos ── */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }
  .chip {
    padding: 4px 10px;
    border: 1px solid var(--border2);
    border-radius: 99px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    background: transparent;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active { border-color: var(--accent); color: var(--bg); background: var(--accent); }

  /* ── EV toggle ── */
  .ev-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    margin-bottom: 10px;
    user-select: none;
  }
  .toggle-switch {
    width: 34px; height: 18px;
    background: var(--border2);
    border-radius: 99px;
    position: relative;
    transition: background .2s;
    flex-shrink: 0;
  }
  .toggle-switch::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--muted);
    top: 3px; left: 3px;
    transition: all .2s;
  }
  .toggle-switch.on { background: var(--accent); }
  .toggle-switch.on::after { left: 19px; background: var(--bg); }
  #ev-fields { display: none; }

  /* ── Calcular btn ── */
  .btn-calc {
    width: 100%;
    height: 42px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: .03em;
    transition: opacity .15s, transform .1s;
  }
  .btn-calc:hover { opacity: .88; }
  .btn-calc:active { transform: scale(.98); }

  /* ── Right panel ── */
  .right { display: flex; flex-direction: column; gap: 1.25rem; }

  /* ── Metrics ── */
  .metrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  @media(max-width:600px){ .metrics { grid-template-columns: 1fr 1fr; } }
  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: .875rem 1rem;
  }
  .metric-label {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: .06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .metric-value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
  }
  .metric-value.g { color: var(--green); }
  .metric-value.r { color: var(--red); }
  .metric-value.a { color: var(--amber); }
  .metric-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    font-family: var(--mono);
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 1.25rem;
  }
  .tab-btn {
    padding: .75rem 1rem;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    margin-bottom: -1px;
    transition: color .15s;
    white-space: nowrap;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--text); }
  .tab-content { padding: 1.25rem; }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* ── Tables ── */
  .tbl-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  thead th {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 7px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    color: var(--text);
    white-space: nowrap;
    font-size: 12px;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  .td-name { font-family: var(--sans); font-size: 12px; color: var(--text); max-width: 220px; overflow: hidden; text-overflow: ellipsis; }

  /* ── Tags ── */
  .tag {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
  }
  .tag-g { background: var(--green-bg); color: var(--green); }
  .tag-r { background: var(--red-bg); color: var(--red); }
  .tag-a { background: var(--amber-bg); color: var(--amber); }
  .tag-d { background: var(--surface2); color: var(--muted); }

  /* ── Empty / placeholder ── */
  #results-placeholder {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 3rem 2rem;
    text-align: center;
  }
  #results-placeholder .ph-icon {
    font-size: 36px;
    margin-bottom: 1rem;
    opacity: .3;
  }
  #results-placeholder p {
    font-size: 13px;
    color: var(--muted);
    font-family: var(--mono);
  }
  #results-panel { display: none; }

  /* ── Nota footer ── */
  .note {
    font-size: 11px;
    color: var(--dim);
    margin-top: 10px;
    font-family: var(--mono);
    line-height: 1.5;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

  /* ── Animations ── */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .anim { animation: fadeIn .25s ease both; }
</style>
</head>
<body>

<header>
  <div class="logo">⚽</div>
  <h1>Sistema / Betcalc</h1>
  <p>uso personal · v1.0</p>
</header>

<main>

  <!-- ── LEFT PANEL ── -->
  <aside>

    <!-- Selecciones -->
    <div class="panel" style="margin-bottom:1rem">
      <div class="panel-header">
        <span class="panel-title">Selecciones</span>
        <span id="sel-count" style="font-family:var(--mono);font-size:11px;color:var(--muted)">0 sel.</span>
      </div>
      <div class="panel-body">
        <div style="display:grid;grid-template-columns:18px 1fr 90px 28px;gap:8px;margin-bottom:6px;padding:0 0 6px;border-bottom:1px solid var(--border)">
          <span></span>
          <span style="font-size:10px;font-family:var(--mono);color:var(--dim);letter-spacing:.06em;text-transform:uppercase">Nombre (opcional)</span>
          <span style="font-size:10px;font-family:var(--mono);color:var(--dim);letter-spacing:.06em;text-transform:uppercase">Cuota</span>
          <span></span>
        </div>
        <div id="sel-list"></div>
        <button class="btn-add" onclick="addSel()">+ añadir selección</button>
      </div>
    </div>

    <!-- Configuración -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Configuración</span>
      </div>
      <div class="panel-body">

        <div class="form-group" style="margin-bottom:12px">
          <label>Monto total a invertir</label>
          <div class="stake-wrap">
            <span>CLP$</span>
            <input type="number" id="stake" value="50000" min="1000" step="1000" placeholder="50000">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Mín. por parlay (k)</label>
            <select id="min-k"></select>
          </div>
          <div class="form-group">
            <label>Máx. por parlay</label>
            <select id="max-k"></select>
          </div>
        </div>

        <div style="margin-bottom:12px">
          <div style="font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">Sistemas rápidos</div>
          <div class="chips" id="chips">
            <button class="chip" data-s="trixie">Trixie</button>
            <button class="chip" data-s="patent">Patent</button>
            <button class="chip" data-s="yankee">Yankee</button>
            <button class="chip" data-s="lucky15">Lucky 15</button>
            <button class="chip" data-s="lucky31">Lucky 31</button>
            <button class="chip" data-s="lucky63">Lucky 63</button>
            <button class="chip" data-s="heinz">Heinz</button>
          </div>
        </div>

        <!-- EV toggle -->
        <div style="border-top:1px solid var(--border);padding-top:12px;margin-bottom:14px">
          <label class="ev-toggle" onclick="toggleEV()">
            <div class="toggle-switch" id="ev-switch"></div>
            <span>Análisis de valor esperado (EV)</span>
          </label>
          <div id="ev-fields">
            <div style="font-size:11px;color:var(--dim);font-family:var(--mono);margin-bottom:8px">Tus probabilidades estimadas (0–100%)</div>
            <div id="prob-list"></div>
          </div>
        </div>

        <button class="btn-calc" onclick="calcular()">CALCULAR →</button>
      </div>
    </div>

  </aside>

  <!-- ── RIGHT PANEL ── -->
  <section class="right">

    <div id="results-placeholder">
      <div class="ph-icon">📊</div>
      <p>Ingresa tus selecciones y pulsa calcular.</p>
    </div>

    <div id="results-panel">

      <!-- Métricas -->
      <div class="metrics anim" id="metrics-grid"></div>

      <!-- Tablas -->
      <div class="panel anim">
        <div class="tabs">
          <button class="tab-btn active" onclick="showTab('escenarios',this)">Escenarios</button>
          <button class="tab-btn" onclick="showTab('parlays',this)">Parlays</button>
          <button class="tab-btn" onclick="showTab('comparativa',this)">Sistemas</button>
          <button class="tab-btn" id="tab-ev-btn" onclick="showTab('ev',this)" style="display:none">EV</button>
        </div>
        <div class="tab-content">
          <div id="tab-escenarios" class="tab-pane active"></div>
          <div id="tab-parlays" class="tab-pane"></div>
          <div id="tab-comparativa" class="tab-pane"></div>
          <div id="tab-ev" class="tab-pane"></div>
        </div>
      </div>

    </div>
  </section>

</main>

<script>
// ─── Datos ────────────────────────────────────────────────────────
const NAMED = {
  trixie:   {n:3, min_k:2, max_k:3, label:'3 sel → 4 apuestas (dobles + treble)'},
  patent:   {n:3, min_k:1, max_k:3, label:'3 sel → 7 apuestas (singles + dobles + treble)'},
  yankee:   {n:4, min_k:2, max_k:4, label:'4 sel → 11 apuestas'},
  lucky15:  {n:4, min_k:1, max_k:4, label:'4 sel → 15 apuestas'},
  lucky31:  {n:5, min_k:1, max_k:5, label:'5 sel → 31 apuestas'},
  lucky63:  {n:6, min_k:1, max_k:6, label:'6 sel → 63 apuestas'},
  heinz:    {n:6, min_k:2, max_k:6, label:'6 sel → 57 apuestas'},
};

let sels = [];
let evEnabled = false;

// ─── Init ─────────────────────────────────────────────────────────
(function init(){
  addSel(1.85,'');
  addSel(2.10,'');
  addSel(3.40,'');
  document.getElementById('chips').querySelectorAll('.chip').forEach(c=>{
    c.addEventListener('click',()=>setSistema(c.dataset.s, c));
  });
})();

// ─── Selecciones ──────────────────────────────────────────────────
function addSel(cuota='', nombre=''){
  const id = Date.now() + Math.random();
  sels.push({id, cuota: cuota||'', nombre: nombre||''});
  renderSels();
}

function removeSel(id){
  sels = sels.filter(s=>s.id!==id);
  renderSels();
}

function renderSels(){
  const list = document.getElementById('sel-list');
  list.innerHTML = '';
  sels.forEach((s,i)=>{
    const row = document.createElement('div');
    row.className = 'sel-row';
    row.innerHTML = `
      <span class="sel-num">${i+1}</span>
      <input type="text" placeholder="ej: Real Madrid G" value="${s.nombre}"
        oninput="sels[${i}].nombre=this.value;syncProbs()">
      <input type="number" placeholder="1.85" value="${s.cuota}" step="0.01" min="1.01"
        oninput="sels[${i}].cuota=this.value">
      <button class="btn-icon" onclick="removeSel(${s.id})">✕</button>
    `;
    list.appendChild(row);
  });
  document.getElementById('sel-count').textContent = sels.length + ' sel.';
  updateKSelects();
  syncProbs();
}

function updateKSelects(){
  const n = sels.length;
  const mk = document.getElementById('min-k');
  const xk = document.getElementById('max-k');
  const curMk = parseInt(mk.value)||2;
  const curXk = parseInt(xk.value)||n;
  mk.innerHTML = ''; xk.innerHTML = '';
  for(let i=1;i<=n;i++){
    mk.add(new Option(i,i));
    xk.add(new Option(i,i));
  }
  mk.value = Math.min(Math.max(curMk,1), n);
  xk.value = Math.min(Math.max(curXk,1), n);
}

// ─── Sistemas rápidos ─────────────────────────────────────────────
function setSistema(name, btn){
  const cfg = NAMED[name];
  if(!cfg) return;
  const n = cfg.n;
  while(sels.length < n) sels.push({id:Date.now()+Math.random(), cuota:'', nombre:''});
  while(sels.length > n) sels.pop();
  renderSels();
  setTimeout(()=>{
    document.getElementById('min-k').value = cfg.min_k;
    document.getElementById('max-k').value = cfg.max_k;
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    if(btn) btn.classList.add('active');
  }, 30);
}

// ─── EV toggle ────────────────────────────────────────────────────
function toggleEV(){
  evEnabled = !evEnabled;
  document.getElementById('ev-switch').classList.toggle('on', evEnabled);
  document.getElementById('ev-fields').style.display = evEnabled ? 'block' : 'none';
  document.getElementById('tab-ev-btn').style.display = evEnabled ? 'inline-block' : 'none';
  syncProbs();
}

function syncProbs(){
  if(!evEnabled) return;
  const list = document.getElementById('prob-list');
  const existing = list.querySelectorAll('input');
  const oldVals = Array.from(existing).map(i=>i.value);
  list.innerHTML = '';
  sels.forEach((s,i)=>{
    const wrap = document.createElement('div');
    wrap.style.cssText='display:grid;grid-template-columns:1fr 80px;gap:8px;margin-bottom:8px;align-items:center';
    wrap.innerHTML = `
      <span style="font-family:var(--sans);font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
        ${s.nombre || 'Sel. '+(i+1)}
      </span>
      <div style="position:relative">
        <input type="number" placeholder="50" value="${oldVals[i]||''}" min="1" max="99" step="1"
          style="padding-right:22px" id="prob-${i}">
        <span style="position:absolute;right:8px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:11px;color:var(--dim);pointer-events:none">%</span>
      </div>
    `;
    list.appendChild(wrap);
  });
}

// ─── Matemática ───────────────────────────────────────────────────
function combos(arr, k){
  if(k===0) return [[]];
  if(arr.length < k) return [];
  const [h,...t] = arr;
  return [...combos(t,k-1).map(c=>[h,...c]), ...combos(t,k)];
}

function genParlays(n, minK, maxK){
  const idx = Array.from({length:n},(_,i)=>i);
  const all = [];
  for(let k=minK;k<=maxK;k++){
    combos(idx,k).forEach(combo=>{
      all.push({indices:combo, k});
    });
  }
  return all;
}

function parlayOdds(combo, cuotas){
  return combo.reduce((p,i)=>p*cuotas[i],1);
}

function retorno(parlays, stakeP, aciertos, cuotas){
  const s = new Set(aciertos);
  return parlays
    .filter(p=>p.indices.every(i=>s.has(i)))
    .reduce((sum,p)=>sum + stakeP*parlayOdds(p.indices, cuotas), 0);
}

function minAciertos(parlays, stakeP, stake, n, cuotas){
  const idx = Array.from({length:n},(_,i)=>i);
  for(let na=1;na<=n;na++){
    const best = Math.max(...combos(idx,na).map(c=>retorno(parlays,stakeP,c,cuotas)));
    if(best >= stake) return na;
  }
  return n+1;
}

// ─── Calcular ─────────────────────────────────────────────────────
function calcular(){
  const cuotas = sels.map(s=>parseFloat(s.cuota));
  const nombres = sels.map((s,i)=>s.nombre||`Sel. ${i+1}`);

  if(sels.length < 2){ alert('Añade al menos 2 selecciones.'); return; }
  if(cuotas.some(isNaN)||cuotas.some(c=>c<=1.0)){
    alert('Todas las cuotas deben ser números mayores a 1.0'); return;
  }

  const stake = parseFloat(document.getElementById('stake').value);
  const minK = parseInt(document.getElementById('min-k').value);
  const maxK = parseInt(document.getElementById('max-k').value);
  if(minK > maxK){ alert('k mínimo no puede ser mayor que k máximo'); return; }
  if(isNaN(stake)||stake<=0){ alert('Ingresa un monto válido'); return; }

  const n = sels.length;
  const parlays = genParlays(n, minK, maxK);
  const stakeP = stake / parlays.length;
  const allIdx = Array.from({length:n},(_,i)=>i);

  const maxRet = retorno(parlays, stakeP, allIdx, cuotas);
  const maxGan = maxRet - stake;
  const maxROI = maxGan/stake*100;
  const minAc  = minAciertos(parlays, stakeP, stake, n, cuotas);

  document.getElementById('results-placeholder').style.display = 'none';
  document.getElementById('results-panel').style.display = 'block';

  renderMetrics(parlays, stakeP, stake, maxRet, maxROI, minAc, n);
  renderEscenarios(cuotas, parlays, stakeP, stake, n);
  renderParlays(parlays, stakeP, nombres, cuotas);
  renderComparativa(cuotas, stake, n);
  if(evEnabled) renderEV(cuotas, nombres, stakeP);
}

// ─── Métricas ─────────────────────────────────────────────────────
function renderMetrics(parlays, stakeP, stake, maxRet, maxROI, minAc, n){
  const rColor = minAc <= Math.ceil(n/2) ? 'g' : minAc < n ? 'a' : 'r';
  const fmtK = v => '$'+Math.round(v).toLocaleString('es-CL');
  document.getElementById('metrics-grid').innerHTML = `
    <div class="metric">
      <div class="metric-label">Parlays totales</div>
      <div class="metric-value">${parlays.length}</div>
      <div class="metric-sub">$${Math.round(stakeP).toLocaleString('es-CL')} c/u</div>
    </div>
    <div class="metric">
      <div class="metric-label">Retorno máximo</div>
      <div class="metric-value g">${fmtK(maxRet)}</div>
      <div class="metric-sub">todos aciertan</div>
    </div>
    <div class="metric">
      <div class="metric-label">ROI máximo</div>
      <div class="metric-value g">+${maxROI.toFixed(1)}%</div>
      <div class="metric-sub">ganancia neta</div>
    </div>
    <div class="metric">
      <div class="metric-label">Stake total</div>
      <div class="metric-value">${fmtK(stake)}</div>
      <div class="metric-sub">invertido</div>
    </div>
    <div class="metric">
      <div class="metric-label">Mín. aciertos rentable</div>
      <div class="metric-value ${rColor}">${minAc}/${n}</div>
      <div class="metric-sub">${minAc<=n?'mejor caso posible':'nunca'}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Pérdida máx.</div>
      <div class="metric-value r">−${fmtK(stake)}</div>
      <div class="metric-sub">0 aciertos</div>
    </div>
  `;
}

// ─── Tag helpers ──────────────────────────────────────────────────
function tagMoney(val, stake){
  if(val>=stake) return `<span class="tag tag-g">$${Math.round(val).toLocaleString('es-CL')}</span>`;
  if(val>0)      return `<span class="tag tag-a">$${Math.round(val).toLocaleString('es-CL')}</span>`;
  return `<span class="tag tag-r">$${Math.round(val).toLocaleString('es-CL')}</span>`;
}
function tagROI(val){
  const sign = val>=0?'+':'';
  if(val>=0) return `<span class="tag tag-g">${sign}${val.toFixed(1)}%</span>`;
  return `<span class="tag tag-r">${val.toFixed(1)}%</span>`;
}

// ─── Escenarios ───────────────────────────────────────────────────
function renderEscenarios(cuotas, parlays, stakeP, stake, n){
  const idx = Array.from({length:n},(_,i)=>i);
  let rows = '';
  for(let na=0;na<=n;na++){
    const cs = combos(idx,na);
    const rets = cs.map(c=>retorno(parlays,stakeP,c,cuotas));
    const mejor = rets.length ? Math.max(...rets) : 0;
    const peor  = rets.length ? Math.min(...rets) : 0;
    const prom  = rets.length ? rets.reduce((a,b)=>a+b,0)/rets.length : 0;
    rows += `<tr>
      <td><strong>${na}/${n}</strong></td>
      <td style="color:var(--muted)">${cs.length}</td>
      <td>${tagMoney(mejor,stake)}</td>
      <td>${tagROI((mejor-stake)/stake*100)}</td>
      <td>${tagMoney(peor,stake)}</td>
      <td>${tagROI((peor-stake)/stake*100)}</td>
      <td>${tagMoney(prom,stake)}</td>
    </tr>`;
  }
  document.getElementById('tab-escenarios').innerHTML = `
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Aciertos</th><th>Combos</th>
          <th>Mejor retorno</th><th>ROI mejor</th>
          <th>Peor retorno</th><th>ROI peor</th>
          <th>Promedio</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <p class="note">Stake total apostado: $${Math.round(parseFloat(document.getElementById('stake').value)).toLocaleString('es-CL')} CLP.
    El "mejor" y "peor" retorno para cada fila corresponden al conjunto de aciertos más y menos favorable posible.</p>
  `;
}

// ─── Parlays ──────────────────────────────────────────────────────
function renderParlays(parlays, stakeP, nombres, cuotas){
  const max = 60;
  let rows = '';
  parlays.slice(0,max).forEach((p,i)=>{
    const label = p.indices.map(j=>nombres[j]).join(' × ');
    const odds = parlayOdds(p.indices, cuotas);
    const ret = stakeP * odds;
    const gan = ret - stakeP;
    rows += `<tr>
      <td style="color:var(--muted)">${i+1}</td>
      <td class="td-name" title="${label}">${label}</td>
      <td style="color:var(--muted)">${p.k}</td>
      <td>${odds.toFixed(3)}</td>
      <td>$${Math.round(stakeP).toLocaleString('es-CL')}</td>
      <td><span class="tag tag-g">$${Math.round(ret).toLocaleString('es-CL')}</span></td>
      <td><span class="tag tag-a">$${Math.round(gan).toLocaleString('es-CL')}</span></td>
    </tr>`;
  });
  const extra = parlays.length > max
    ? `<p class="note">Mostrando ${max} de ${parlays.length} parlays.</p>` : '';
  document.getElementById('tab-parlays').innerHTML = `
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>#</th><th>Selecciones</th><th>k</th><th>Cuota comb.</th><th>Stake</th><th>Retorno</th><th>Ganancia</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>${extra}
  `;
}

// ─── Comparativa ──────────────────────────────────────────────────
function renderComparativa(cuotas, stake, n){
  const idx = Array.from({length:n},(_,i)=>i);
  let rows = '';
  for(let minK=1;minK<=n;minK++){
    for(let maxK=minK;maxK<=n;maxK++){
      const parlays = genParlays(n,minK,maxK);
      if(parlays.length > 250) continue;
      const stakeP = stake/parlays.length;
      const allRet = retorno(parlays,stakeP,idx,cuotas);
      const roi = (allRet-stake)/stake*100;
      let minAc = n+1;
      for(let na=1;na<=n;na++){
        const best = Math.max(...combos(idx,na).map(c=>retorno(parlays,stakeP,c,cuotas)));
        if(best>=stake){minAc=na;break;}
      }
      const [rtxt,rcls] = minAc<=Math.ceil(n/2)?['BAJO','tag-g']:minAc<n?['MEDIO','tag-a']:['ALTO','tag-r'];
      const lbl = minK===maxK ? `${minK}/${n}` : `${minK}–${maxK}/${n}`;
      rows += `<tr>
        <td><strong>${lbl}</strong></td>
        <td>${parlays.length}</td>
        <td>$${Math.round(stakeP).toLocaleString('es-CL')}</td>
        <td><span class="tag tag-g">$${Math.round(allRet).toLocaleString('es-CL')}</span></td>
        <td>${tagROI(roi)}</td>
        <td>${minAc}/${n}</td>
        <td><span class="tag ${rcls}">${rtxt}</span></td>
      </tr>`;
    }
  }
  document.getElementById('tab-comparativa').innerHTML = `
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Sistema</th><th>Parlays</th><th>Stake/parlay</th><th>Retorno máx.</th><th>ROI máx.</th><th>Mín. aciertos</th><th>Riesgo</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <p class="note">Sistemas con más de 250 parlays se omiten. "Mín. aciertos" = cuántos debes acertar en el mejor conjunto posible para no perder.</p>
  `;
}

// ─── EV ───────────────────────────────────────────────────────────
function renderEV(cuotas, nombres, stakeP){
  let rows = '';
  let allPositive = true;
  cuotas.forEach((c,i)=>{
    const inp = document.getElementById('prob-'+i);
    const pct = inp ? parseFloat(inp.value) : NaN;
    if(isNaN(pct)||pct<=0||pct>=100){ rows += `<tr><td class="td-name">${nombres[i]}</td><td>${c.toFixed(2)}</td><td colspan="4" style="color:var(--dim)">— sin prob. estimada</td></tr>`; return; }
    const p = pct/100;
    const pImp = 1/c*100;
    const edge = pct - pImp;
    const ev = stakeP*(c*p-1);
    const hasVal = edge > 0;
    if(!hasVal) allPositive = false;
    rows += `<tr>
      <td class="td-name">${nombres[i]}</td>
      <td>${c.toFixed(2)}</td>
      <td style="color:var(--muted)">${pImp.toFixed(1)}%</td>
      <td>${pct.toFixed(1)}%</td>
      <td>${hasVal?`<span class="tag tag-g">+${edge.toFixed(1)}%</span>`:`<span class="tag tag-r">${edge.toFixed(1)}%</span>`}</td>
      <td>${ev>=0?`<span class="tag tag-g">$${Math.round(ev).toLocaleString('es-CL')}</span>`:`<span class="tag tag-r">−$${Math.round(Math.abs(ev)).toLocaleString('es-CL')}</span>`}</td>
    </tr>`;
  });
  document.getElementById('tab-ev').innerHTML = `
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Selección</th><th>Cuota</th><th>P. implícita</th><th>P. estimada</th><th>Edge</th><th>EV / parlay</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <p class="note">Edge = tu prob. estimada menos la prob. implícita de la casa. EV positivo = valor esperado favorable para esa selección.</p>
  `;
}

// ─── Tabs ─────────────────────────────────────────────────────────
function showTab(name, btn){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}
</script>
